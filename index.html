<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Queuing System Simulation</title>

  <!-- CSS FILE -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <div class="title">Queuing System Simulation</div>

  <div class="stats">

    <div class="stat-row">
      <span class="stat-label">TICK</span>
      <span class="stat-val" id="s-tick">0</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">QUEUE</span>
      <span class="stat-val" id="s-queue">0</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">SERVED</span>
      <span class="stat-val" id="s-served">0</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">AVG WAIT</span>
      <span class="stat-val" id="s-wait">0.0 ticks</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">NEXT ARRIVAL</span>
      <span class="stat-val" id="s-next-arrival">0</span>
    </div>

  </div>

  <div class="canvas-area">

    <div class="queue-label">WAITING QUEUE</div>

    <div class="queue-track">
      <div class="queue-line"></div>
      <div id="queue-people"></div>
    </div>

    <div class="arrow">↓</div>

    <div class="servers-row" id="servers-row"></div>

    <div class="service-label">SERVICE AREA</div>

  </div>

  <div class="controls">

    <div class="ctrl-row">
      <span class="ctrl-name">Servers</span>

      <input
        type="range"
        id="r-servers"
        min="1"
        max="10"
        step="1"
        value="4"
      >

      <div class="ctrl-val" id="v-servers">4</div>
    </div>

    <div class="ctrl-row">
      <span class="ctrl-name">Arrival Interval</span>

      <input
        type="range"
        id="r-arrival-min"
        min="1"
        max="15"
        step="1"
        value="2"
      >

      <input
        type="range"
        id="r-arrival-max"
        min="2"
        max="20"
        step="1"
        value="6"
      >

      <div class="ctrl-val" id="v-arrival">2-6</div>
    </div>

    <div class="ctrl-row">
      <span class="ctrl-name">Service Ticks</span>

      <input
        type="range"
        id="r-service-min"
        min="1"
        max="15"
        step="1"
        value="4"
      >

      <input
        type="range"
        id="r-service-max"
        min="2"
        max="30"
        step="1"
        value="10"
      >

      <div class="ctrl-val" id="v-service">4-10</div>
    </div>

  </div>

  <div class="btns">
    <button class="btn active" id="btn-pause">Pause</button>
    <button class="btn" id="btn-reset">Reset</button>
  </div>

  <div id="status-bar">
    ● Running in standalone mode (real-time local simulation)
  </div>

</div>

<!-- JAVASCRIPT FILE -->
<script src="script.js"></script>

</body>
</html>
