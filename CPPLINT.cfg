# CPPLINT Configuration
# Naming Conventions: PascalCase for classes, snake_case for variables/functions/methods

# Root directory for relative includes
root=.

# Directories to exclude from linting
exclude_dirs=.git,build,dist,test,third_party

# File extensions to lint
extensions=cpp,h

# Maximum line length
linelength=100

# Disabled checks:
# - build/include_subdir: Allows #include of files in same directory
# - runtime/references: Allows non-const references
# - whitespace/*: Deferred to clang-format
# - readability/nolint: Allow nolint comments
filter=-build/include_subdir,-runtime/references,-whitespace/blank_line,-whitespace/indent,-readability/nolint