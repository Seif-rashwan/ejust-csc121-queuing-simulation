name: Code Style & Quality Check
on: [push, pull_request]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting and collect failed files
        id: format
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(find . -name "*.cpp" -o -name "*.h")
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C++ files found. Skipping."
            exit 0
          fi

          # Check formatting without modifying files
          clang-format --dry-run --Werror "${files[@]}" 2>&1 | tee format_output.txt || {
            # Extract filenames from clang-format output
            failed_files=$(grep -oP 'error: file '\''[^'\'']+'\'' needs formatting' format_output.txt | sed "s/error: file '//;s/' needs formatting//")
            
            # If no matches, list all files and let clang-format detect which ones fail
            if [ -z "$failed_files" ]; then
              failed_files=$(clang-format --dry-run "${files[@]}" 2>&1 | grep "needs formatting" | sed "s/.*'\(.*\)'.*/\1/" || echo "")
            fi
            
            {
              echo "failed_files<<'EOF'"
              echo "${failed_files}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            
            exit 1
          }

      - name: Comment on PR with failed files
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          FAILED_FILES: ${{ steps.format.outputs.failed_files }}
