name: Code Style Check
on: [push, pull_request]
permissions:
  contents: write

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      
      - name: Apply code formatting with clang-format
        run: |
          find . -name "*.cpp" -o -name "*.h" | xargs clang-format -i

      - name: Commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto format with clang-format"

  cpplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install cpplint
        run: pip install cpplint
      
      - name: Run cpplint
        run: cpplint --recursive src/ include/

  naming-conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check naming conventions
        run: python3 .github/scripts/check_naming_conventions.py

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      
      - name: Run static analysis with cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem --error-exitcode=1 \
            src/ include/