name: Code Style & Quality Check
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        id: format
        run: |
          mapfile -t files < <(find src include \( -name "*.cpp" -o -name "*.h" \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C++ files found. Skipping."
            exit 0
          fi
          clang-format --dry-run --Werror "${files[@]}"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const existing = comments.find(c =>
              c.user?.type === "Bot" &&
              (c.body || "").includes("Code Formatting Check Failed")
            );

            if ("${{ steps.format.outcome }}" === "success") {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id
                });
              }
              return;
            }

            const body = [
              "### ⚠️ Code Formatting Check Failed (clang-format)",
              "",
              "One or more files do not meet formatting standards.",
              "",
              "**To fix locally:**",
              "```bash",
              "clang-format -i $(find src include \\( -name \"*.cpp\" -o -name \"*.h\" \\))",
              "git add -A && git commit --amend --no-edit && git push --force-with-lease",
              "```"
            ].join("\n");

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }

  cpplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cpplint
        run: pip install cpplint

      - name: Run cpplint (uses CPPLINT.cfg)
        run: cpplint --recursive src/ include/

  file-naming-conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check naming conventions
        run: python3 .github/scripts/check_naming_conventions.py

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cppcheck clang-tidy

      - name: Run cppcheck
        run: |
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=virtualCallInConstructor \
            --suppress=unusedFunction:src/CustomerType.cpp \
            --suppress=unusedFunction:src/ServerListType.cpp \
            --suppress=unusedFunction:src/ServerType.cpp \
            --suppress=unusedFunction:src/WaitingCustomerQueue.cpp \
            -I./include \
            --error-exitcode=1 \
            src/ include/

      - name: Run clang-tidy
        run: |
          find src -name "*.cpp" | \
          xargs clang-tidy -- -std=c++23 -Iinclude