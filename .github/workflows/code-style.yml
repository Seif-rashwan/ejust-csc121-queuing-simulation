            // Update existing bot comment to avoid spam
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100
            });

            const existing = comments.find(c =>
              c.user?.type === "Bot" &&
              (c.body || "").includes("Code Formatting Check Failed")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }

  cpplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cpplint
        run: pip install cpplint

      - name: Run cpplint (uses CPPLINT.cfg)
        run: cpplint --recursive src/ include/

  naming-conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check naming conventions
        run: python3 .github/scripts/check_naming_conventions.py

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run static analysis with cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
            -I./include \
            --exit-code-suppressions=warning --error-exitcode=1 src/ include/